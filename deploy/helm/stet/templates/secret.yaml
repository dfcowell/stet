{{- if not .Values.existingSecret }}
{{- if not .Values.anthropic.apiKey }}{{ fail "anthropic.apiKey is required (or set existingSecret)" }}{{- end }}
{{- if not .Values.session.secret }}{{ fail "session.secret is required (or set existingSecret)" }}{{- end }}
{{- if and .Values.oidc.enabled (not .Values.oidc.clientSecret) }}{{ fail "oidc.clientSecret is required when oidc.enabled (or set existingSecret)" }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stet.fullname" . }}
  labels:
    {{- include "stet.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | quote }}
  STET_SESSION_SECRET: {{ .Values.session.secret | quote }}
  {{- if .Values.oidc.enabled }}
  STET_OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
